[build]
  base    = "apps/formand"
  command = "npm install && npm run build"
  publish = "dist"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# index.html må aldrig caches af browseren — ellers serveres gammel app-shell
# efter en ny deploy (assets er hash-navngivne og caches fint som immutable).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
