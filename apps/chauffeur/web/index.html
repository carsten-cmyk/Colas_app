<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Colas Chauffør App</title>

    <style id="expo-reset">
      html, body { height: 100%; margin: 0; padding: 0; }
      body { overflow: auto; background: #041c28; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>

    <style>
      /* ── Page layout ────────────────────────────────────── */
      body {
        font-family: -apple-system, sans-serif;
        background: linear-gradient(160deg, #041c28 0%, #0B3950 55%, #0E4764 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        box-sizing: border-box;
      }

      /* Subtle dot-grid */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
        background-size: 28px 28px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Demo header ────────────────────────────────────── */
      .demo-header {
        position: relative;
        z-index: 1;
        text-align: center;
        margin-bottom: 28px;
      }
      .demo-header-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin: 0;
      }

      /* ── iPhone 14 Pro frame ────────────────────────────── */
      .iphone-outer {
        position: relative;
        z-index: 1;
        width: 417px;   /* 393 screen + 12px border each side */
        height: 876px;  /* 852 screen + 12px border each side */
        flex-shrink: 0;
        filter: drop-shadow(0 40px 80px rgba(0,0,0,0.7));
      }

      /* Phone body */
      .iphone-body {
        position: absolute;
        inset: 0;
        background: #1A1A1C;
        border-radius: 52px;
        box-shadow:
          0 0 0 1px #3A3A3C,
          inset 0 1px 0 rgba(255,255,255,0.07);
      }

      /* Side buttons */
      .iphone-body::before {
        content: '';
        position: absolute;
        left: -3px;
        top: 116px;
        width: 3px;
        height: 26px;
        background: #3A3A3C;
        border-radius: 2px 0 0 2px;
        box-shadow: 0 44px 0 #3A3A3C, 0 94px 0 #3A3A3C;
      }
      .iphone-body::after {
        content: '';
        position: absolute;
        right: -3px;
        top: 178px;
        width: 3px;
        height: 72px;
        background: #3A3A3C;
        border-radius: 0 2px 2px 0;
      }

      /* Screen area — clips the app */
      .iphone-screen {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 393px;
        height: 852px;
        background: #000;
        border-radius: 42px;
        overflow: hidden;
      }

      /* Dynamic Island */
      .iphone-screen::before {
        content: '';
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 126px;
        height: 37px;
        background: #000;
        border-radius: 20px;
        z-index: 9999;
        pointer-events: none;
      }

      /* Home indicator */
      .iphone-screen::after {
        content: '';
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 134px;
        height: 5px;
        background: rgba(255,255,255,0.85);
        border-radius: 3px;
        z-index: 9999;
        pointer-events: none;
      }

      /* ── App root inside screen ─────────────────────────── */
      #root {
        position: absolute !important;
        inset: 0 !important;
        height: 100% !important;
        width: 100% !important;
        overflow: hidden;
      }

      /* ── Footer ─────────────────────────────────────────── */
      .demo-footer {
        position: relative;
        z-index: 1;
        margin-top: 24px;
        font-size: 11px;
        color: rgba(255,255,255,0.18);
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="demo-header">
      <p class="demo-header-title">Colas Chauffør &mdash; Demo</p>
    </div>

    <!-- iPhone 14 Pro frame -->
    <div class="iphone-outer">
      <div class="iphone-body"></div>
      <div class="iphone-screen">
        <!-- Expo app mounts here -->
        <div id="root"></div>
      </div>
    </div>

    <p class="demo-footer">&copy; 2026 Colas Danmark A/S</p>

    <noscript>Du skal aktivere JavaScript for at køre denne app.</noscript>
  </body>
</html>
